name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore and test
        run: dotnet test tests/METERP.Application.Tests/METERP.Application.Tests.csproj --configuration Release --verbosity normal

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build E2E project
        run: dotnet build tests/METERP.E2ETests/METERP.E2ETests.csproj --configuration Release

      - name: Install Playwright browsers
        run: pwsh tests/METERP.E2ETests/bin/Release/net9.0/playwright.ps1 install chromium --with-deps

      - name: Start app with docker-compose
        run: |
          docker compose up --build -d
          echo "Waiting for app readiness..."
          for i in {1..60}; do
            if curl -sf http://localhost:8080/health/ready > /dev/null; then
              echo "App is ready"
              exit 0
            fi
            sleep 5
          done
          echo "App failed to become ready"
          docker compose logs web
          exit 1

      - name: Run E2E tests
        env:
          METERP_BASE_URL: http://localhost:8080
        run: dotnet test tests/METERP.E2ETests/METERP.E2ETests.csproj --configuration Release --filter "Category=E2E" --verbosity normal

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-screenshots
          path: e2e-failure-*.png
          if-no-files-found: ignore

      - name: Docker logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v