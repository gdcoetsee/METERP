version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    env_file:
      - path: .env
        required: false
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Connection string uses docker service name "postgres" as host. This overrides appsettings.
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=METERP;Username=postgres;Password=postgres;Port=5432
      - Seq__ServerUrl=http://seq:5341
      - Cache__RedisConnection=redis:6379
      - Billing__CustomerPortalBaseUrl=https://billing.stripe.com/p/login/demo_meterp
      - Billing__CustomerPortalReturnUrl=http://localhost:8080/tenants
      - Billing__WebhookEventRetentionDays=90
      # Optional: set to "true" to force a full DB reset + reseed on start (useful after model changes).
      # - METERP_SEED_RESET=true
      # Note: By default the seeder is now safe (Migrate + seed only missing data). Postgres data volume persists across restarts.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    volumes:
      - dataprotection_keys:/app/dataprotection-keys
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      seq:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=METERP
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d METERP"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  seq:
    image: datalust/seq:2024.3
    ports:
      - "5341:80"
    environment:
      - ACCEPT_EULA=Y
    volumes:
      - seq_data:/data

volumes:
  postgres_data:
  seq_data:
  dataprotection_keys: