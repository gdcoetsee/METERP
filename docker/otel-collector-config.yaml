# OpenTelemetry Collector — enable with: docker compose --profile observability up --build
# Web exports to http://otel-collector:4317 (gRPC) when OpenTelemetry__OtlpEndpoint is set.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  debug:
    verbosity: basic

processors:
  batch:

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]